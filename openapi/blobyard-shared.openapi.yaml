openapi: 3.1.0
info:
  title: Blob Yard API
  version: 1.0.0
  description:
    The stable API for durable object storage and scoped access. Stored files do not expire when a
    transfer grant or public capability expires.
servers:
  - url: https://api.blobyard.com/v1
security:
  - bearerAuth: []
paths: {}
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    githubOidc:
      type: http
      scheme: bearer
      bearerFormat: GitHub OIDC JWT
  responses:
    ApiError:
      description: The request was rejected.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorEnvelope"
  schemas:
    Identifier:
      type: string
      description: Stable resource identifier.
      minLength: 1
      maxLength: 256
    Cursor:
      type: string
      description: Opaque continuation cursor.
      minLength: 1
      maxLength: 1024
    Slug:
      type: string
      description: Lowercase Blob Yard resource slug.
      pattern: ^[a-z0-9](?:[a-z0-9-]{0,62}[a-z0-9])?$
    IsoTimestamp:
      type: string
      description: RFC 3339 timestamp.
      format: date-time
    UnixMilliseconds:
      type: integer
      description: Unix timestamp in milliseconds.
      minimum: 0
    BlobyardUri:
      type: string
      description: Canonical byd:// object URI.
      pattern: ^byd://
    CapabilityToken:
      type: string
      description: Opaque capability returned once.
      minLength: 43
    Url:
      type: string
      description: Absolute HTTPS URL.
      format: uri
      pattern: ^https://
    TransferUrl:
      type: string
      description: Absolute HTTP or HTTPS URL for a short-lived byte-transfer capability.
      format: uri
      pattern: ^https?://
    EmptyResult:
      type: object
      additionalProperties: false
      properties: {}
      required: []
    HealthResult:
      type: object
      additionalProperties: false
      properties:
        status:
          type: string
          description: Service readiness state.
          const: ok
        version:
          type: string
          description: Build version.
      required:
        - status
        - version
    ExchangeBootstrapTokenResult:
      type: object
      additionalProperties: false
      properties:
        accessToken:
          $ref: "#/components/schemas/CapabilityToken"
        scopes:
          type: array
          items:
            type: string
            description: Granted local operation scope.
          description: Scopes granted to the local operator token.
        webYardOrigin:
          type: string
          format: uri
          description: Trusted root origin whose first-level subdomains serve public Web Yards.
        workspace:
          $ref: "#/components/schemas/Slug"
      required:
        - accessToken
        - scopes
        - webYardOrigin
        - workspace
    WorkspaceSummary:
      type: object
      additionalProperties: false
      properties:
        id:
          $ref: "#/components/schemas/Identifier"
        name:
          type: string
          description: Workspace display name.
        slug:
          $ref: "#/components/schemas/Slug"
      required:
        - id
        - name
        - slug
    WorkspacePage:
      type: object
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/WorkspaceSummary"
          description: Resources in this page.
        nextCursor:
          anyOf:
            - $ref: "#/components/schemas/Cursor"
            - type: "null"
      required:
        - items
        - nextCursor
    ProjectSummary:
      type: object
      additionalProperties: false
      properties:
        id:
          $ref: "#/components/schemas/Identifier"
        name:
          type: string
          description: Project display name.
        slug:
          $ref: "#/components/schemas/Slug"
        workspaceSlug:
          $ref: "#/components/schemas/Slug"
      required:
        - id
        - name
        - slug
        - workspaceSlug
    ProjectPage:
      type: object
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProjectSummary"
          description: Resources in this page.
        nextCursor:
          anyOf:
            - $ref: "#/components/schemas/Cursor"
            - type: "null"
      required:
        - items
        - nextCursor
    TokenPair:
      type: object
      additionalProperties: false
      properties:
        accessToken:
          $ref: "#/components/schemas/CapabilityToken"
        expiresInSeconds:
          type: integer
          description: Access token lifetime.
          minimum: 1
        refreshToken:
          $ref: "#/components/schemas/CapabilityToken"
      required:
        - accessToken
        - expiresInSeconds
        - refreshToken
    DeviceStartResult:
      type: object
      additionalProperties: false
      properties:
        deviceCode:
          $ref: "#/components/schemas/CapabilityToken"
        expiresAt:
          $ref: "#/components/schemas/IsoTimestamp"
        pollIntervalSeconds:
          type: integer
          description: Minimum polling interval.
          minimum: 1
        userCode:
          type: string
          description: Code shown for browser approval.
        verificationUri:
          $ref: "#/components/schemas/Url"
      required:
        - deviceCode
        - expiresAt
        - pollIntervalSeconds
        - userCode
        - verificationUri
    DevicePollResult:
      oneOf:
        - type: object
          additionalProperties: false
          properties:
            status:
              type: string
              description: Authorization state.
              enum:
                - pending
                - slow_down
                - denied
                - expired
          required:
            - status
        - type: object
          additionalProperties: false
          properties:
            status:
              type: string
              description: Completed authorization state.
              const: approved
            tokens:
              $ref: "#/components/schemas/TokenPair"
          required:
            - status
            - tokens
    WhoAmIResult:
      type: object
      additionalProperties: false
      properties:
        defaultWorkspace:
          $ref: "#/components/schemas/WorkspaceSummary"
        displayName:
          type: string
          description: Safe principal label.
        email:
          type: string
          description: Verified user email, present for user credentials.
          format: email
        principalId:
          $ref: "#/components/schemas/Identifier"
        principalType:
          type: string
          description: Principal class.
          enum:
            - cli
            - ci
        scopes:
          type: array
          items:
            type: string
            description: Granted scope.
          description: Granted scopes.
      required:
        - defaultWorkspace
        - displayName
        - principalId
        - principalType
        - scopes
    MachineTokenResult:
      type: object
      additionalProperties: false
      properties:
        accessToken:
          $ref: "#/components/schemas/CapabilityToken"
        expiresInSeconds:
          type: integer
          description: Token lifetime.
          minimum: 1
        scopes:
          type: array
          items:
            type: string
            description: Granted scope.
          description: Granted scopes.
      required:
        - accessToken
        - expiresInSeconds
        - scopes
    SignedHeader:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          description: HTTP header name.
        value:
          type: string
          description: Signed header value.
      required:
        - name
        - value
    UploadPartGrant:
      type: object
      additionalProperties: false
      properties:
        partNumber:
          type: integer
          description: Positive part number.
          minimum: 1
        uploadUrl:
          $ref: "#/components/schemas/TransferUrl"
      required:
        - partNumber
        - uploadUrl
    RequestUploadResult:
      type: object
      additionalProperties: false
      properties:
        expiresAt:
          $ref: "#/components/schemas/IsoTimestamp"
        headers:
          type: array
          items:
            $ref: "#/components/schemas/SignedHeader"
          description: Required upload headers.
        partSizeBytes:
          anyOf:
            - type: integer
              description: Multipart part size.
              minimum: 1
            - type: "null"
        strategy:
          type: string
          description: Upload strategy.
          enum:
            - single
            - multipart
        uploadId:
          $ref: "#/components/schemas/Identifier"
        uploadUrl:
          anyOf:
            - $ref: "#/components/schemas/TransferUrl"
            - type: "null"
      required:
        - expiresAt
        - headers
        - partSizeBytes
        - strategy
        - uploadId
        - uploadUrl
    RequestUploadPartsResult:
      type: object
      additionalProperties: false
      properties:
        expiresAt:
          $ref: "#/components/schemas/IsoTimestamp"
        parts:
          type: array
          items:
            $ref: "#/components/schemas/UploadPartGrant"
          description: Signed part grants.
      required:
        - expiresAt
        - parts
    CompleteUploadResult:
      type: object
      additionalProperties: false
      properties:
        checksumSha256:
          type: string
          description: Verified SHA-256 digest.
          pattern: ^[a-f0-9]{64}$
        sizeBytes:
          type: integer
          description: Verified object bytes.
          minimum: 0
        uri:
          $ref: "#/components/schemas/BlobyardUri"
      required:
        - checksumSha256
        - sizeBytes
        - uri
    UploadStatusResult:
      type: object
      additionalProperties: false
      properties:
        completedParts:
          type: array
          items:
            type: integer
            description: Completed part number.
            minimum: 1
          description: Completed parts.
        state:
          type: string
          description: Upload lifecycle state.
          enum:
            - requested
            - uploading
            - completing
            - complete
            - aborted
            - expired
            - failed
      required:
        - completedParts
        - state
    DownloadResult:
      type: object
      additionalProperties: false
      properties:
        checksumSha256:
          type: string
          description: Expected SHA-256 digest.
          pattern: ^[a-f0-9]{64}$
        downloadUrl:
          $ref: "#/components/schemas/TransferUrl"
        expiresAt:
          $ref: "#/components/schemas/IsoTimestamp"
        filename:
          type: string
          description: Download filename.
        sizeBytes:
          type: integer
          description: Expected bytes.
          minimum: 0
      required:
        - checksumSha256
        - downloadUrl
        - expiresAt
        - filename
        - sizeBytes
    ObjectSummary:
      type: object
      additionalProperties: false
      properties:
        availability:
          type: string
          description: Current object-version availability.
          enum:
            - available
            - deleted
            - pending
            - unavailable
        createdAt:
          $ref: "#/components/schemas/IsoTimestamp"
        filename:
          type: string
          description: Original safe filename.
        sizeBytes:
          type: integer
          description: Object bytes.
          minimum: 0
        source:
          type: string
          description: Object ingestion source.
          enum:
            - ci
            - cli
            - inbox
            - preview
            - web
        uri:
          $ref: "#/components/schemas/BlobyardUri"
      required:
        - availability
        - createdAt
        - filename
        - sizeBytes
        - source
        - uri
    ObjectPage:
      type: object
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ObjectSummary"
          description: Resources in this page.
        nextCursor:
          anyOf:
            - $ref: "#/components/schemas/Cursor"
            - type: "null"
      required:
        - items
        - nextCursor
    DeleteObjectResult:
      type: object
      additionalProperties: false
      properties:
        deleted:
          type: boolean
          description: The object is now deleted.
          const: true
        uri:
          $ref: "#/components/schemas/BlobyardUri"
      required:
        - deleted
        - uri
    CreateShareResult:
      type: object
      additionalProperties: false
      properties:
        expiresAt:
          $ref: "#/components/schemas/IsoTimestamp"
        id:
          $ref: "#/components/schemas/Identifier"
        notificationStatus:
          type: string
          description: Notification capture or delivery result.
          enum:
            - captured
            - deduplicated
            - failed
            - not_requested
            - queued
        shareUrl:
          $ref: "#/components/schemas/Url"
      required:
        - expiresAt
        - id
        - notificationStatus
        - shareUrl
    ShareSummary:
      type: object
      additionalProperties: false
      properties:
        consumedCount:
          type: integer
          description: Completed downloads.
          minimum: 0
        expiresAt:
          $ref: "#/components/schemas/IsoTimestamp"
        id:
          $ref: "#/components/schemas/Identifier"
        maximumDownloads:
          anyOf:
            - type: integer
              description: Maximum downloads.
              minimum: 1
            - type: "null"
        status:
          type: string
          description: Share lifecycle state.
          enum:
            - active
            - expired
            - exhausted
            - revoked
            - unavailable
      required:
        - consumedCount
        - expiresAt
        - id
        - maximumDownloads
        - status
    SharePage:
      type: object
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ShareSummary"
          description: Resources in this page.
        nextCursor:
          anyOf:
            - $ref: "#/components/schemas/Cursor"
            - type: "null"
      required:
        - items
        - nextCursor
    ShareMetadata:
      type: object
      additionalProperties: false
      properties:
        contentTypeClass:
          type: string
          description: Coarse content class.
        downloadAvailable:
          type: boolean
          description: Whether another download is available.
        expiresAt:
          $ref: "#/components/schemas/IsoTimestamp"
        filename:
          type: string
          description: Shared filename.
        sizeBytes:
          type: integer
          description: Object bytes.
          minimum: 0
      required:
        - contentTypeClass
        - downloadAvailable
        - expiresAt
        - filename
        - sizeBytes
    CreatePreviewResult:
      type: object
      additionalProperties: false
      properties:
        expiresAt:
          $ref: "#/components/schemas/IsoTimestamp"
        id:
          $ref: "#/components/schemas/Identifier"
        previewUrl:
          $ref: "#/components/schemas/Url"
      required:
        - expiresAt
        - id
        - previewUrl
    PreviewSummary:
      type: object
      additionalProperties: false
      properties:
        createdAt:
          $ref: "#/components/schemas/IsoTimestamp"
        expiresAt:
          $ref: "#/components/schemas/IsoTimestamp"
        id:
          $ref: "#/components/schemas/Identifier"
        status:
          type: string
          description: Preview lifecycle state.
          enum:
            - active
            - expired
            - exhausted
            - revoked
      required:
        - createdAt
        - expiresAt
        - id
        - status
    PreviewPage:
      type: object
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/PreviewSummary"
          description: Resources in this page.
        nextCursor:
          anyOf:
            - $ref: "#/components/schemas/Cursor"
            - type: "null"
      required:
        - items
        - nextCursor
    CreateInboxResult:
      type: object
      additionalProperties: false
      properties:
        expiresAt:
          $ref: "#/components/schemas/IsoTimestamp"
        id:
          $ref: "#/components/schemas/Identifier"
        inboxUrl:
          $ref: "#/components/schemas/Url"
      required:
        - expiresAt
        - id
        - inboxUrl
    InboxSummary:
      type: object
      additionalProperties: false
      properties:
        expiresAt:
          $ref: "#/components/schemas/IsoTimestamp"
        id:
          $ref: "#/components/schemas/Identifier"
        name:
          type: string
          description: Inbox display name.
        revoked:
          type: boolean
          description: Whether the inbox is revoked.
      required:
        - expiresAt
        - id
        - name
        - revoked
    InboxPage:
      type: object
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/InboxSummary"
          description: Resources in this page.
        nextCursor:
          anyOf:
            - $ref: "#/components/schemas/Cursor"
            - type: "null"
      required:
        - items
        - nextCursor
    InboxMetadata:
      type: object
      additionalProperties: false
      properties:
        expiresAt:
          $ref: "#/components/schemas/IsoTimestamp"
        maxBytes:
          type: integer
          description: Maximum accepted bytes.
          minimum: 0
        maxFiles:
          type: integer
          description: Maximum accepted files.
          minimum: 0
        name:
          type: string
          description: Inbox display name.
        uploadAvailable:
          type: boolean
          description: Whether another upload may be started.
      required:
        - expiresAt
        - maxBytes
        - maxFiles
        - name
        - uploadAvailable
    RetentionPolicy:
      type: object
      additionalProperties: false
      properties:
        branchGlob:
          anyOf:
            - type: string
              description: Optional branch glob.
            - type: "null"
        keepLatest:
          type: integer
          description: Newest matching versions to keep.
          minimum: 1
        pathGlob:
          anyOf:
            - type: string
              description: Optional logical path glob.
            - type: "null"
      required:
        - branchGlob
        - keepLatest
        - pathGlob
    ClearRetentionResult:
      type: object
      additionalProperties: false
      properties:
        cleared:
          type: boolean
          description: Retention is now disabled.
          const: true
      required:
        - cleared
    WebYardSummary:
      type: object
      additionalProperties: false
      properties:
        currentDeployId:
          anyOf:
            - $ref: "#/components/schemas/Identifier"
            - type: "null"
        hostLabel:
          type: string
          description: Stable public alias host label.
        id:
          $ref: "#/components/schemas/Identifier"
        name:
          $ref: "#/components/schemas/Slug"
        projectId:
          $ref: "#/components/schemas/Identifier"
        status:
          type: string
          description: Yard status.
          enum:
            - active
            - suspended
        url:
          $ref: "#/components/schemas/Url"
        workspaceId:
          $ref: "#/components/schemas/Identifier"
      required:
        - currentDeployId
        - hostLabel
        - id
        - name
        - projectId
        - status
        - url
        - workspaceId
    WebYardPage:
      type: object
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/WebYardSummary"
          description: Resources in this page.
        nextCursor:
          anyOf:
            - $ref: "#/components/schemas/Cursor"
            - type: "null"
      required:
        - items
        - nextCursor
    YardDeploySummary:
      type: object
      additionalProperties: false
      properties:
        cleanUrls:
          type: boolean
          description: Whether extensionless HTML resolution is enabled.
        clientDeployId:
          $ref: "#/components/schemas/Identifier"
        createdAt:
          $ref: "#/components/schemas/UnixMilliseconds"
        deploymentUrl:
          $ref: "#/components/schemas/Url"
          description: Immutable public URL bound to this exact deploy while it is retained.
        fileCount:
          type: integer
          description: Manifest file count.
          minimum: 0
        finalisedAt:
          anyOf:
            - $ref: "#/components/schemas/UnixMilliseconds"
            - type: "null"
        id:
          $ref: "#/components/schemas/Identifier"
        isCurrent:
          type: boolean
          description: Whether the public alias selects this deploy.
        spa:
          type: boolean
          description: Whether SPA fallback is enabled.
        status:
          type: string
          description: Deploy lifecycle state.
          enum:
            - uploading
            - finalising
            - live
            - failed
            - superseded
            - pruned
        totalBytes:
          type: integer
          description: Manifest bytes.
          minimum: 0
      required:
        - cleanUrls
        - clientDeployId
        - createdAt
        - deploymentUrl
        - fileCount
        - finalisedAt
        - id
        - isCurrent
        - spa
        - status
        - totalBytes
    YardDeployPage:
      type: object
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/YardDeploySummary"
          description: Resources in this page.
        nextCursor:
          anyOf:
            - $ref: "#/components/schemas/Cursor"
            - type: "null"
      required:
        - items
        - nextCursor
    StartWebYardDeployResult:
      type: object
      additionalProperties: false
      properties:
        deployId:
          $ref: "#/components/schemas/Identifier"
        deploymentUrl:
          $ref: "#/components/schemas/Url"
          description: Immutable public URL reserved for this exact deploy.
        hostLabel:
          type: string
          description: Allocated host label.
        manifestRoot:
          type: string
          description: Reserved manifest root.
        status:
          type: string
          description: New deploy lifecycle state.
          const: uploading
        url:
          $ref: "#/components/schemas/Url"
        yardId:
          $ref: "#/components/schemas/Identifier"
        yardName:
          $ref: "#/components/schemas/Slug"
      required:
        - deployId
        - deploymentUrl
        - hostLabel
        - manifestRoot
        - status
        - url
        - yardId
        - yardName
    YardDeploymentResult:
      type: object
      additionalProperties: false
      properties:
        deployId:
          $ref: "#/components/schemas/Identifier"
        deploymentUrl:
          $ref: "#/components/schemas/Url"
          description: Immutable public URL bound to the selected deploy while it is retained.
        status:
          type: string
          description: Selected deploy lifecycle state.
          enum:
            - live
            - superseded
        url:
          $ref: "#/components/schemas/Url"
          description: Stable public Web Yard alias selected by the operation.
      required:
        - deployId
        - deploymentUrl
        - status
        - url
    AuditEvent:
      type: object
      additionalProperties: false
      properties:
        action:
          type: string
          description: Stable audit action.
        actor:
          type: string
          description: Safe actor label.
        createdAt:
          $ref: "#/components/schemas/IsoTimestamp"
        id:
          $ref: "#/components/schemas/Identifier"
        metadata:
          type: object
          description: Redaction-safe operation metadata.
          additionalProperties:
            type:
              - string
              - number
              - boolean
              - "null"
          x-blobyard-opaque: true
        requestId:
          type: string
          description: Request correlation identifier.
        targetType:
          type: string
          description: Redaction-safe target class.
      required:
        - action
        - actor
        - createdAt
        - id
        - requestId
        - targetType
    AuditPage:
      type: object
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AuditEvent"
          description: Audit events.
        nextCursor:
          anyOf:
            - $ref: "#/components/schemas/Cursor"
            - type: "null"
      required:
        - items
        - nextCursor
    MemberSummary:
      type: object
      additionalProperties: false
      properties:
        displayName:
          anyOf:
            - type: string
              description: Member display name.
            - type: "null"
        email:
          type: string
          description: Member email.
          format: email
        joinedAt:
          $ref: "#/components/schemas/UnixMilliseconds"
        role:
          type: string
          description: Workspace role.
          enum:
            - owner
            - admin
            - member
        userId:
          $ref: "#/components/schemas/Identifier"
      required:
        - displayName
        - email
        - joinedAt
        - role
        - userId
    SeatState:
      type: object
      additionalProperties: false
      properties:
        active:
          type: integer
          description: Active seats.
          minimum: 0
        limit:
          anyOf:
            - type: integer
              description: Seat limit.
              minimum: 0
            - type: "null"
        reserved:
          type: integer
          description: Seats reserved by pending invitations.
          minimum: 0
        used:
          type: integer
          description: Active plus reserved seats.
          minimum: 0
      required:
        - active
        - limit
        - reserved
        - used
      description: Server-derived seat state.
    MemberList:
      type: object
      additionalProperties: false
      properties:
        members:
          type: array
          items:
            $ref: "#/components/schemas/MemberSummary"
          description: Workspace members.
        seats:
          $ref: "#/components/schemas/SeatState"
      required:
        - members
        - seats
    InviteSummary:
      type: object
      additionalProperties: false
      properties:
        createdAt:
          $ref: "#/components/schemas/UnixMilliseconds"
        email:
          type: string
          description: Invite email.
          format: email
        expiresAt:
          $ref: "#/components/schemas/UnixMilliseconds"
        id:
          $ref: "#/components/schemas/Identifier"
        role:
          type: string
          description: Workspace role.
          enum:
            - owner
            - admin
            - member
        status:
          type: string
          description: Invite lifecycle state.
      required:
        - createdAt
        - email
        - expiresAt
        - id
        - role
        - status
    InviteList:
      type: array
      items:
        $ref: "#/components/schemas/InviteSummary"
      description: Workspace invitations.
    CreateInviteResult:
      type: object
      additionalProperties: false
      properties:
        expiresAt:
          $ref: "#/components/schemas/UnixMilliseconds"
        id:
          $ref: "#/components/schemas/Identifier"
        inviteUrl:
          $ref: "#/components/schemas/Url"
      required:
        - expiresAt
        - id
        - inviteUrl
